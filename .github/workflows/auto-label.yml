name: Auto Label Issues

on:
  issues:
    types: [opened, edited]

jobs:
  label-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check for keyword and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const combined = title + ' ' + body;

            const labelsToAdd = [];

            if (combined.includes('error')) {
              labelsToAdd.push('bug');
            }
            if (combined.includes('add')) {
              labelsToAdd.push('feature');
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd
              });
              console.log(`Added labels: ${labelsToAdd.join(', ')} to issue #${issue.number}`);
            } else {
              console.log(`No keyword labels matched for issue #${issue.number}`);
            }
